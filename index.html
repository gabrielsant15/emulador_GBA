<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA SPACE NEON :: Hyper Emulator</title>
    
    <!-- Configurações para PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./icon.png">
    <link rel="icon" type="image/png" href="./icon.png">

    <style>
        /* ESTILOS GERAIS & TEMA NEON */
        body {
            background: radial-gradient(circle, #0b001a 0%, #000000 100%);
            color: #00ffff; /* Ciano Neon */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 {
            color: #00d2ff;
            text-shadow: 0 0 10px #00d2ff, 0 0 20px #0088cc;
            font-size: 2.5rem;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Container do Emulador */
        .emulator-container {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
            border: 4px solid #00ffff;
            border-radius: 20px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 20px #00ffff, inset 0 0 15px #00ffff;
        }

        /* Moldura de Tela */
        .screen-frame {
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ff00ff; /* Rosa Neon */
            box-shadow: 0 0 15px #ff00ff;
            aspect-ratio: 3 / 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

    <h1>GBA SPACE NEON</h1>

    <div class="emulator-container">
        <div class="screen-frame">
            <!-- Seu Canvas ou elemento do emulador aqui -->
            <canvas id="emulator-canvas"></canvas>
        </div>
    </div>

    <script>
        // Registrar o Service Worker para o PWA funcionar offline
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA ativo com sucesso! ', reg.scope))
                    .catch(err => console.log('Falha ao registrar Service Worker: ', err));
            });
        }
    </script>
</body>
</html>
