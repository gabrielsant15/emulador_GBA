<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emulador GBA</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff00; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #game-box { width: 800px; height: 600px; max-width: 95vw; border: 2px solid #00ff00; background: #000; position: relative; }
        .instrucoes { color: #888; font-size: 12px; margin-top: 10px; }
        #canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <h1>EMULADOR GBA</h1>

    <div id="game-box">
        <div id="game"></div>
    </div>

    <div class="instrucoes">Selecione o arquivo .gba | Teclas: Z, X, Enter, Shift</div>

    <script>
        window.EJS_player = '#game';
        window.EJS_core = 'gba';
        window.EJS_pathtodata = 'https://rawcdn.githack.com/emulatorjs/emulatorjs/main/data/';
        window.EJS_startOnLoaded = false; // Não inicia sozinho para não travar
        window.EJS_language = 'pt-BR';
    </script>
    <script src="https://rawcdn.githack.com/emulatorjs/emulatorjs/main/data/loader.js"></script>

</body>
</html>
