<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Emulador GBA</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; }
        #game-container { width: 640px; height: 480px; max-width: 100%; margin: 20px auto; border: 2px solid #0f0; position: relative; }
        #game { width: 100%; height: 100%; }
        .controles { color: #555; font-size: 12px; }
        #btn-select {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; z-index: 99;
        }
    </style>
</head>
<body>

    <h1>GBA ONLINE</h1>

    <div id="game-container">
        <button id="btn-select" onclick="document.getElementById('file-input').click()">CLIQUE AQUI PARA SELECIONAR O JOGO (.GBA)</button>
        <div id="game"></div>
    </div>

    <input type="file" id="file-input" accept=".gba" style="display:none">

    <p class="controles">Z: A | X: B | Enter: Start | Setas: Movimento</p>

    <script>
        document.getElementById('file-input').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('btn-select').style.display = 'none';
                
                window.EJS_player = '#game';
                window.EJS_core = 'gba';
                window.EJS_gameUrl = URL.createObjectURL(file);
                window.EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/emulatorjs/emulatorjs@main/data/';
                window.EJS_startOnLoaded = true;

                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/gh/emulatorjs/emulatorjs@main/data/loader.js';
                document.body.appendChild(script);
            }
        };
    </script>
</body>
</html>
