<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA Emulator - Solo Leveling Project</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            text-shadow: 0 0 10px #00ff00;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        p {
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        /* Moldura do Emulador */
        #game-container {
            width: 800px;
            height: 600px;
            max-width: 95vw;
            max-height: 70vh;
            border: 3px solid #1a1a1a;
            border-radius: 8px;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }

        #game {
            width: 100%;
            height: 100%;
        }

        .footer {
            margin-top: 15px;
            font-size: 0.7rem;
            color: #444;
        }
    </style>
</head>
<body>

    <h1>SISTEMA DE CAÇADOR - GBA</h1>
    <p>Selecione sua ROM para iniciar a dungeon</p>

    <div id="game-container">
        <div id="game"></div>
    </div>

    <div class="footer">
        Desenvolvido por gabrielsant15 | Teclas: Z, X, Enter, Shift e Setas
    </div>

    <script>
        // Configurações Globais
        EJS_player = '#game';
        EJS_core = 'gba'; 
        EJS_color = '#00ff00'; 
        EJS_startOnLoaded = true;
        
        // Links estáveis para o Chrome rodar sem erro de rede
        EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/emulatorjs/emulatorjs@main/data/';
    </script>

    <script src="https://cdn.jsdelivr.net/gh/emulatorjs/emulatorjs@main/data/loader.js"></script>

</body>
</html>
