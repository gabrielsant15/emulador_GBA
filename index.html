<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA Emulator - Solo Leveling Project</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 { text-shadow: 0 0 10px #00ff00; margin-bottom: 10px; font-size: 1.5rem; }
        
        #game-container {
            width: 800px;
            height: 600px;
            max-width: 95vw;
            max-height: 70vh;
            border: 3px solid #1a1a1a;
            border-radius: 8px;
            background-color: #000;
            position: relative;
        }

        #game { width: 100%; height: 100%; }

        /* Botão de carregar centralizado */
        #controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .btn-load {
            background-color: #00ff00;
            color: #000;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            box-shadow: 0 0 15px #00ff00;
        }

        .btn-load:hover { background-color: #00cc00; }
    </style>
</head>
<body>

    <h1>SISTEMA DE CAÇADOR - GBA</h1>

    <div id="game-container">
        <div id="controls">
            <input type="file" id="file-input" accept=".gba" style="display: none;">
            <button class="btn-load" onclick="document.getElementById('file-input').click()">INICIAR DUNGEON (CARREGAR ROM)</button>
        </div>
        <div id="game"></div>
    </div>

    <script>
        EJS_player = '#game';
        EJS_core = 'gba'; 
        EJS_color = '#00ff00'; 
        EJS_startOnLoaded = true;
        EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/emulatorjs/emulatorjs@main/data/';

        // Lógica para esconder o botão quando o jogo carregar
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('controls').style.display = 'none';
                // O EmulatorJS vai detectar o arquivo automaticamente se você usar o loader padrão, 
                // mas para garantir, vamos usar a função de carregar interna se necessário.
                EJS_gameUrl = URL.createObjectURL(file);
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/gh/emulatorjs/emulatorjs@main/data/loader.js"></script>

</body>
</html>
